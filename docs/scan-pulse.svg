<svg width="960" height="360" viewBox="0 0 960 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated signal pulse showing device scan">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#grid)"/>
  <g stroke="#0f1f3a" stroke-width="1" opacity="0.6">
    <path d="M0 60h960M0 120h960M0 180h960M0 240h960M0 300h960"/>
    <path d="M120 0v360M240 0v360M360 0v360M480 0v360M600 0v360M720 0v360M840 0v360"/>
  </g>
  <g transform="translate(480 180)">
    <circle r="16" fill="#1e3a8a" opacity="0.8"/>
    <circle r="28" fill="#2563eb" opacity="0.6"/>
    <circle r="44" fill="url(#glow)"/>
    <circle r="44" fill="none" stroke="#60a5fa" stroke-width="2">
      <animate attributeName="r" values="44;140;44" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0;0.9" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle r="70" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.7">
      <animate attributeName="r" values="70;200;70" dur="4.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.75;0;0.75" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle r="110" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 12" opacity="0.5">
      <animate attributeName="r" values="110;240;110" dur="5.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="5.5s" repeatCount="indefinite" />
    </circle>
    <path d="M0 -160 L0 -200" stroke="#38bdf8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.9;0.2;0.9" dur="2.8s" repeatCount="indefinite" />
    </path>
    <path d="M-20 -210 L0 -230 L20 -210" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-opacity" values="0.9;0.2;0.9" dur="2.8s" repeatCount="indefinite" />
    </path>
  </g>
  <g fill="#9ca3af" font-family="Inter, 'Segoe UI', system-ui" font-size="14" opacity="0.9">
    <text x="40" y="44">Live Scan Pulse · RSSI rings expand with each detection</text>
    <text x="40" y="68">Bluetooth + Geolocation required</text>
    <text x="760" y="320" text-anchor="end">MyBTLocator · Animated SVG preview</text>
  </g>
</svg>
